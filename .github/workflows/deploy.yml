# Deploys this repo to Cloudflare Pages on every push to main.
# Replaces the broken Vercel auto-deploy that we lost when this repo
# went private (Vercel Hobby doesn't support private org repos; CF
# Pages does).
#
# Required secrets (set per-repo):
#   CLOUDFLARE_API_TOKEN — generate at
#     https://dash.cloudflare.com/profile/api-tokens
#     using the "Edit Cloudflare Workers" template
#   CLOUDFLARE_ACCOUNT_ID — visible in `npx wrangler whoami` or in the
#     CF dashboard URL/sidebar

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=vixfixpro --branch=main --commit-dirty=true
